# Round-1 weak annotation pipeline configuration
# Local inference via Qwen2.5-VL-7B-Instruct on GPU.
# Designed for Kaggle (free T4 / P100 GPU).
#
# Set HF_TOKEN env var if needed for model download:
#   export HF_TOKEN="hf_..."

# ---------------------------------------------------------------------------
# Routing thresholds
# ---------------------------------------------------------------------------
sarcastic_high: 0.85
nonsarcastic_low: 0.15
conf_threshold: 0.70
random_audit_rate: 0.10
seed: 42

# ---------------------------------------------------------------------------
# Model & inference settings
# ---------------------------------------------------------------------------

# HuggingFace model ID (downloaded locally on first run)
llm_model: "Qwen/Qwen2.5-VL-7B-Instruct"

# Provider tag (kept for reference; local inference ignores this field)
llm_provider: "local"

llm_temperature: 0.1

# Device to run inference on: "cuda" (GPU) or "cpu"
device: "cuda"

# Enable 4-bit quantization via bitsandbytes.
# Strongly recommended on Kaggle T4 (16 GB VRAM) — reduces model VRAM from
# ~14 GB (float16) to ~4 GB, leaving headroom for activations.
load_in_4bit: true

# ---------------------------------------------------------------------------
# Pipeline
# ---------------------------------------------------------------------------

# Number of records per checkpoint save. Lower = more frequent saves.
# Keep small for local inference (each record takes a few seconds).
batch_size: 8
